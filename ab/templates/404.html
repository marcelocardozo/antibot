<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>404 - Página não encontrada</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        html,
        body {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f5f5f5;
            color: #333;
        }
        
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
        }
        
        .container {
            max-width: 480px;
        }
        
        h1 {
            font-size: 6rem;
            font-weight: 700;
            color: #ccc;
            line-height: 1;
            margin-bottom: 12px;
        }
        
        h2 {
            font-size: 1.25rem;
            font-weight: 600;
            color: #444;
            margin-bottom: 10px;
        }
        
        p {
            font-size: 0.95rem;
            color: #777;
            line-height: 1.6;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>404</h1>
        <h2>Página não encontrada</h2>
        <p>O recurso solicitado não existe ou foi removido.</p>
    </div>
</body>

</html>
